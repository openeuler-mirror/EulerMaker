services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd0=http://etcd:2380
      - --initial-cluster-token=ebs-cluster
      - --initial-cluster-state=new
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data
    networks:
      - ebs-net
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health", "--endpoints=http://localhost:2379"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - ebs-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 10
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  ebs-apiserver:
    image: swr.cn-north-4.myhuaweicloud.com/eulermaker/ebs-apiserver:latest
    command:
      - --etcd-servers=http://etcd:2379
      - --es-servers=http://elasticsearch:9200
    ports:
      - "8443:8443"
    networks:
      - ebs-net
    depends_on:
      etcd:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  ebs-gateway:
    build:
      context: ../components/ebs-gateway
    environment:
      - EBS_APISERVER=https://ebs-apiserver:8443
      - JWT_SECRET=dev-secret
      - INSECURE_SKIP_VERIFY=true
      - RATE_LIMIT_PER_SEC=100
      - RATE_LIMIT_BURST=200
    ports:
      - "8080:8080"
    networks:
      - ebs-net
    depends_on:
      - ebs-apiserver

networks:
  ebs-net:
    driver: bridge

volumes:
  etcd-data:
  es-data:
